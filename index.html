<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memotreeee</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--surface:#f5f5f3;--border:#e0ddd6;--border-strong:#c8c5be;
  --border-stronger:#9a9790;--text:#1a1a18;--text-secondary:#6b6966;
  --text-muted:#a8a5a0;--accent:#378ADD;--danger:#E24B4A;--radius:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--surface:#252523;--border:#3a3835;--border-strong:#524f4a;
  --border-stronger:#706d68;--text:#f0ede8;--text-secondary:#a8a5a0;--text-muted:#6b6966;
}}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;}

/* LOGIN */
#login-screen{display:none;position:fixed;inset:0;background:#F7F5EE;z-index:100;align-items:center;justify-content:center;}
#login-screen.visible{display:flex;}
.login-card{
  width:280px;min-height:320px;background:#F7F5EE;border-radius:16px;border:0.5px solid #e0ddd6;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;position:relative;overflow:hidden;
}
.login-bg-green{position:absolute;bottom:-40px;left:-30px;width:130px;height:130px;border-radius:50%;background:#EAF7D8;opacity:0.7;}
.login-bg-blue{position:absolute;top:15%;right:-30px;width:100px;height:100px;border-radius:50%;background:#EAF5FD;opacity:0.5;}
.login-bg-yellow{position:absolute;top:-30px;left:-20px;width:90px;height:90px;border-radius:50%;background:#FEF9D8;opacity:0.8;}
.login-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;}
.login-icon{width:52px;height:52px;border-radius:14px;background:#fff;border:0.5px solid #e0ddd6;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:26px;}
.login-logo{font-size:24px;font-weight:700;color:#1a1a18;letter-spacing:-0.5px;margin-bottom:24px;}
.login-logo span{color:#7EC845;}
.google-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:9px;border:0.5px solid #e0ddd6;background:#fff;color:#1a1a18;cursor:pointer;font-size:13px;}
.google-btn:hover{background:#f5f5f3;}
.google-btn svg{width:16px;height:16px;flex-shrink:0;}

/* RICH TEXT TOOLBAR */
#format-toolbar{
  display:none;position:fixed;z-index:50;
  background:var(--bg);border:0.5px solid var(--border-strong);
  border-radius:8px;padding:4px 6px;gap:2px;align-items:center;
  box-shadow:0 2px 12px rgba(0,0,0,0.1);
}
#format-toolbar.visible{display:flex;}
.fmt-btn{
  width:28px;height:28px;border-radius:5px;border:none;
  background:transparent;color:var(--text-secondary);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:500;
}
.fmt-btn:hover{background:var(--surface);color:var(--text);}
.fmt-btn.active{background:var(--surface);color:var(--text);}
.fmt-sep{width:0.5px;height:18px;background:var(--border-strong);margin:0 3px;}
.fmt-color-wrap{position:relative;}
.fmt-color-btn{width:28px;height:28px;border-radius:5px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.fmt-color-btn:hover{background:var(--surface);}
.fmt-color-letter{font-size:13px;font-weight:700;color:var(--text);line-height:1;}
.fmt-color-bar{width:16px;height:3px;border-radius:2px;}
.color-picker-popup{
  display:none;position:absolute;top:34px;left:50%;transform:translateX(-50%);
  background:var(--bg);border:0.5px solid var(--border-strong);border-radius:8px;
  padding:8px;gap:6px;flex-wrap:wrap;width:122px;z-index:60;
  box-shadow:0 2px 12px rgba(0,0,0,0.12);
}
.color-picker-popup.visible{display:flex;}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:0.5px solid rgba(0,0,0,0.1);}
.color-dot:hover{transform:scale(1.2);}
.highlight-picker-popup{
  display:none;position:absolute;top:34px;left:50%;transform:translateX(-50%);
  background:var(--bg);border:0.5px solid var(--border-strong);border-radius:8px;
  padding:8px;gap:6px;flex-wrap:wrap;width:122px;z-index:60;
  box-shadow:0 2px 12px rgba(0,0,0,0.12);
}
.highlight-picker-popup.visible{display:flex;}

/* SIDEBAR */
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:20;transition:transform 0.2s;}
#sidebar.hidden{transform:translateX(-220px);}
.sidebar-header{padding:14px 12px 10px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}
.sidebar-header .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.sidebar-header h1{font-size:14px;font-weight:500;flex:1;}
.user-avatar{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--border);cursor:pointer;object-fit:cover;}
.user-avatar-placeholder{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;cursor:pointer;flex-shrink:0;}
.page-list{flex:1;overflow-y:auto;padding:8px 6px;}
.page-item{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-secondary);border:0.5px solid transparent;margin-bottom:2px;}
.page-item:hover{background:var(--bg);color:var(--text);}
.page-item.active{background:var(--bg);color:var(--text);border-color:var(--border);}
.page-item-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.page-del{opacity:0;width:16px;height:16px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;flex-shrink:0;border-radius:3px;display:flex;align-items:center;justify-content:center;}
.page-item:hover .page-del,.page-item.active .page-del{opacity:1;}
.page-del:hover{color:var(--danger);}
.sidebar-footer{padding:10px 6px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.new-page-btn{width:100%;padding:7px 10px;border:0.5px dashed var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;}
.new-page-btn:hover{background:var(--bg);color:var(--text-secondary);}
.logout-btn{width:100%;padding:6px 10px;border:none;border-radius:var(--radius);background:transparent;color:var(--text-muted);cursor:pointer;font-size:11px;text-align:left;}
.logout-btn:hover{color:var(--danger);}
.sync-status{font-size:10px;color:var(--text-muted);padding:0 10px 4px;min-height:14px;}

/* MAIN */
#main{margin-left:220px;display:flex;flex-direction:column;min-height:100vh;flex:1;transition:margin-left 0.2s;}
#main.full{margin-left:0;}
header{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);position:sticky;top:0;z-index:10;}
#sidebar-toggle{width:28px;height:28px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px;}
#sidebar-toggle:hover{background:var(--surface);}
#page-title-display{flex:1;font-size:15px;font-weight:500;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hbtn{padding:5px 12px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.hbtn:hover{background:var(--surface);color:var(--text);}
.hbtn:disabled{opacity:0.4;cursor:default;}

/* TREE */
#content{padding:24px 20px 80px;overflow-x:auto;}
.tree-root{display:flex;flex-direction:column;}
.node-group{display:flex;flex-direction:row;align-items:center;}
.node-self{display:flex;flex-direction:column;justify-content:center;flex-shrink:0;}
.node-row{display:flex;align-items:center;min-height:32px;padding:4px 0;}
.node-content{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.node-bullet{width:6px;height:6px;border-radius:50%;border:1.5px solid var(--border-stronger);flex-shrink:0;cursor:pointer;transition:background 0.15s;}
.node-bullet:hover{background:var(--border-stronger);}
.node-bullet.title-bullet{display:none;}
.node-text-wrap{position:relative;display:inline-flex;flex-direction:column;}
.node-text{border:none;outline:none;background:transparent;line-height:1.5;white-space:nowrap;font-family:inherit;min-width:20px;min-height:1.5em;padding:0 0 2px 0;display:inline-block;}
.node-text:empty:before{content:attr(data-placeholder);color:var(--text-muted);pointer-events:none;}
.node-underline{width:100%;margin-top:1px;transition:background 0.15s;}
.node-text.title-text{font-size:22px;font-weight:600;color:var(--text);}
.node-underline.title-underline{height:2px;background:var(--border-strong);}
.node-text-wrap:focus-within .title-underline{background:var(--accent);}
.node-text.body-text{font-size:15px;color:var(--text);transition:font-size 0.12s;}
.node-underline.body-underline{height:1px;background:var(--border-strong);}
.node-text-wrap:focus-within .body-underline{background:var(--border-stronger);}
.node-text.body-text.focused{font-size:19px;}
.node-text.title-text.focused{font-size:26px;}

/* ノード移動モード：緑の外枠 */
.node-group.nav-selected>.node-self>.node-row{
  outline:2px solid #7EC845;
  border-radius:6px;
  outline-offset:2px;
}
/* 編集モード中は外枠なし */
.node-group.editing>.node-self>.node-row{
  outline:none;
}
.add-btns{display:none;gap:2px;align-items:center;margin-left:6px;flex-shrink:0;}
.node-row:hover .add-btns,.node-content:focus-within .add-btns{display:flex;}
.title-add-btns{display:none!important;}
.add-btn{width:20px;height:20px;border-radius:3px;border:0.5px solid var(--border-strong);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;}
.add-btn:hover{background:var(--bg);color:var(--text);}
.del-btn{width:20px;height:20px;border-radius:3px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;}
.del-btn:hover{color:var(--danger);}
.connector-col{width:28px;flex-shrink:0;position:relative;}
.children-col{display:flex;flex-direction:column;justify-content:center;}
.root-add{margin-top:16px;}
.root-add-btn{font-size:12px;color:var(--text-muted);border:0.5px dashed var(--border-strong);border-radius:var(--radius);padding:5px 14px;background:transparent;cursor:pointer;display:flex;align-items:center;gap:6px;}
.root-add-btn:hover{color:var(--text-secondary);background:var(--surface);}

@media print{
  @page{size:A4;margin:20mm;}
  #sidebar,header,.add-btns,.root-add,#login-screen{display:none!important;}
  #main{margin-left:0!important;}
  #content{padding:0;overflow:visible;}
  body{background:#fff;color:#000;}
  .node-text{color:#000!important;white-space:normal!important;}
  .node-underline{background:#ccc!important;}
  .title-underline{background:#999!important;}
  .connector-svg line,.connector-svg path{stroke:#ccc!important;}
  .node-bullet{border-color:#888!important;}
}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-bg-green"></div>
    <div class="login-bg-blue"></div>
    <div class="login-bg-yellow"></div>
    <div class="login-content">
      <div class="login-icon">🌿</div>
      <div class="login-logo">memo<span>treeee</span></div>
      <button class="google-btn" onclick="loginWithGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </button>
    </div>
  </div>
</div>

<!-- リッチテキストツールバー -->
<div id="format-toolbar">
  <button class="fmt-btn" id="fmt-bold" onclick="execFmt('bold')" title="太字 (Ctrl+B)"><b>B</b></button>
  <div class="fmt-sep"></div>
  <div class="fmt-color-wrap">
    <button class="fmt-color-btn" id="fmt-color-btn" onclick="toggleColorPicker()" title="文字色">
      <span class="fmt-color-letter" id="fmt-color-letter">A</span>
      <span class="fmt-color-bar" id="fmt-color-bar" style="background:#1a1a18;"></span>
    </button>
    <div class="color-picker-popup" id="color-picker">
      <div class="color-dot" style="background:#1a1a18;" onclick="setColor('#1a1a18')"></div>
      <div class="color-dot" style="background:#E24B4A;" onclick="setColor('#E24B4A')"></div>
      <div class="color-dot" style="background:#378ADD;" onclick="setColor('#378ADD')"></div>
      <div class="color-dot" style="background:#7EC845;" onclick="setColor('#7EC845')"></div>
      <div class="color-dot" style="background:#EF9F27;" onclick="setColor('#EF9F27')"></div>
      <div class="color-dot" style="background:#9B59B6;" onclick="setColor('#9B59B6')"></div>
      <div class="color-dot" style="background:#a8a5a0;" onclick="setColor('#a8a5a0')"></div>
    </div>
  </div>
  <div class="fmt-sep"></div>
  <div class="fmt-color-wrap">
    <button class="fmt-color-btn" id="fmt-highlight-btn" onclick="toggleHighlightPicker()" title="マーカー">
      <span style="font-size:13px;">🖊</span>
      <span class="fmt-color-bar" id="fmt-highlight-bar" style="background:#FEF08A;"></span>
    </button>
    <div class="highlight-picker-popup" id="highlight-picker">
      <div class="color-dot" style="background:#FEF08A;" onclick="setHighlight('#FEF08A')"></div>
      <div class="color-dot" style="background:#BBF7D0;" onclick="setHighlight('#BBF7D0')"></div>
      <div class="color-dot" style="background:#BFDBFE;" onclick="setHighlight('#BFDBFE')"></div>
      <div class="color-dot" style="background:#FBCFE8;" onclick="setHighlight('#FBCFE8')"></div>
      <div class="color-dot" style="background:#FED7AA;" onclick="setHighlight('#FED7AA')"></div>
      <div class="color-dot" style="background:#E9D5FF;" onclick="setHighlight('#E9D5FF')"></div>
      <div class="color-dot" style="background:transparent;border:0.5px solid var(--border-strong);" onclick="setHighlight('transparent')" title="なし"></div>
    </div>
  </div>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" onclick="clearFormat()" title="書式をすべて削除" style="font-size:11px;color:var(--text-muted);">消去</button>
</div>

<div id="sidebar">
  <div class="sidebar-header">
    <span style="font-size:16px;">🌿</span>
    <h1 style="font-size:13px;font-weight:700;letter-spacing:-0.3px;">memo<span style="color:#7EC845;">treeee</span></h1>
    <div id="user-icon"></div>
  </div>
  <div class="page-list" id="page-list"></div>
  <div class="sidebar-footer">
    <div class="sync-status" id="sync-status"></div>
    <button class="new-page-btn" onclick="newPage(null,true)">＋ 新しいページ</button>
    <button class="new-page-btn" onclick="openRoomModal()" style="border-color:#7EC845;color:#7EC845;">🌿 共有ルーム</button>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
</div>

<!-- 共有ルームモーダル -->
<div id="room-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;">
  <div style="background:var(--bg);border-radius:12px;padding:24px;width:340px;border:0.5px solid var(--border);position:relative;max-height:90vh;overflow-y:auto;">
    <button onclick="closeRoomModal()" style="position:absolute;top:12px;right:12px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;">✕</button>
    <div style="font-size:15px;font-weight:600;margin-bottom:4px;">🌿 共有ルーム</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:20px;">複数人で同じツリーをリアルタイム編集</div>

    <!-- 参加・作成ビュー -->
    <div id="room-view-join">
      <!-- ルーム作成 -->
      <div style="margin-bottom:16px;">
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">新しいルームを作成</div>
        <input id="room-name-input" placeholder="ルーム名（例：企画会議）" maxlength="30"
          style="width:100%;padding:8px 10px;border-radius:6px;border:0.5px solid var(--border-strong);background:var(--bg);color:var(--text);font-size:14px;outline:none;margin-bottom:8px;">
        <button onclick="createRoom()" style="width:100%;padding:9px;border-radius:6px;border:none;background:#7EC845;color:#fff;cursor:pointer;font-size:13px;font-weight:500;">＋ 作成してすぐ入る</button>
      </div>

      <div style="border-top:0.5px solid var(--border);padding-top:16px;margin-bottom:16px;">
        <div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">コードで参加</div>
        <div style="display:flex;gap:6px;">
          <input id="room-code-input" placeholder="12桁のコード" maxlength="12"
            style="flex:1;padding:8px 10px;border-radius:6px;border:0.5px solid var(--border-strong);background:var(--bg);color:var(--text);font-size:14px;font-family:monospace;letter-spacing:0.1em;outline:none;">
          <button onclick="joinRoom()" style="padding:8px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;">参加</button>
        </div>
      </div>

      <!-- 最近のルーム -->
      <div id="recent-rooms-section" style="display:none;">
        <div style="border-top:0.5px solid var(--border);padding-top:16px;">
          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">最近のルーム</div>
          <div id="recent-rooms-list"></div>
        </div>
      </div>
    </div>

    <!-- 参加中ビュー -->
    <div id="room-view-active" style="display:none;">
      <div id="room-title-display" style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:12px;"></div>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">ルームコード</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        <div id="room-code-display" style="flex:1;font-size:18px;font-weight:700;font-family:monospace;letter-spacing:0.15em;color:var(--text);background:var(--surface);padding:10px 14px;border-radius:8px;border:0.5px solid var(--border);"></div>
        <button onclick="copyRoomCode()" style="padding:8px 12px;border-radius:6px;border:0.5px solid var(--border-strong);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:12px;" id="copy-btn">コピー</button>
      </div>
      <button onclick="closeRoomModal()" style="width:100%;padding:8px;border-radius:6px;border:0.5px solid var(--border-strong);background:transparent;color:var(--text);cursor:pointer;font-size:13px;margin-bottom:8px;">編集画面へ戻る</button>
      <button onclick="leaveRoom()" style="width:100%;padding:8px;border-radius:6px;border:0.5px solid var(--danger);background:transparent;color:var(--danger);cursor:pointer;font-size:13px;">ルームを退出</button>
    </div>
  </div>
</div>

<div id="main">
  <header>
    <button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="サイドバー">☰</button>
    <span id="page-title-display">無題</span>
    <span id="room-indicator" style="display:none;align-items:center;gap:5px;flex-shrink:0;background:#F0FAE4;border-radius:20px;padding:3px 10px 3px 6px;border:0.5px solid #b6e88a;">
      <span style="font-size:13px;">🌿</span>
      <span id="room-indicator-name" style="font-size:12px;color:#4a8a1a;font-weight:500;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <span style="font-size:12px;" title="共有ルーム">👥</span>
    </span>
    <div style="display:flex;gap:4px;align-items:center;">
      <button class="hbtn" id="undo-btn" onclick="undo()" title="元に戻す (Ctrl+Z)" disabled>↩ 戻す</button>
      <button class="hbtn" id="redo-btn" onclick="redo()" title="やり直す (Ctrl+Y)" disabled>↪ 進む</button>
      <button class="hbtn" onclick="clearAllFormat()" title="全ノードの書式を削除">✕ 全書式削除</button>
      <button class="hbtn" onclick="exportPDF()">⬇ PDF</button>

/* ── APP STATE ── */
let pages=[], currentPageId=null, nextNodeId=100, nextPageId=10, nodes=[], sidebarVisible=true;

/* UNDO/REDO */
let undoStack=[], redoStack=[];
function snapshot(){
  // nodes の深いコピー（htmlフィールドも含む）
  undoStack.push(JSON.stringify({nodes:nodes.map(n=>({...n})),nextNodeId}));
  if(undoStack.length>50) undoStack.shift();
  redoStack=[];
  updateUndoButtons();
}
function undo(){
  if(!undoStack.length) return;
  // 現在状態をredoに積む前にDOMからhtmlを最新化
  syncHtmlFromDom();
  redoStack.push(JSON.stringify({nodes:nodes.map(n=>({...n})),nextNodeId}));
  const s=JSON.parse(undoStack.pop());
  nodes=s.nodes; nextNodeId=s.nextNodeId;
  renderTree(); saveCurrent(); updateUndoButtons();
}
function redo(){
  if(!redoStack.length) return;
  syncHtmlFromDom();
  undoStack.push(JSON.stringify({nodes:nodes.map(n=>({...n})),nextNodeId}));
  const s=JSON.parse(redoStack.pop());
  nodes=s.nodes; nextNodeId=s.nextNodeId;
  renderTree(); saveCurrent(); updateUndoButtons();
}
function updateUndoButtons(){
  const u=document.getElementById('undo-btn');
  const r=document.getElementById('redo-btn');
  if(u) u.disabled=undoStack.length===0;
  if(r) r.disabled=redoStack.length===0;
}
// DOMの現在のhtmlをnodesに同期
function syncHtmlFromDom(){
  nodes.forEach(n=>{
    const el=document.getElementById('t'+n.id);
    if(el){n.html=el.innerHTML;n.text=el.innerText.replace(/\n/g,'');}
  });
}

function uid(){return nextPageId++;}
function nuid(){return nextNodeId++;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getNode(id){return nodes.find(n=>n.id===id);}
function getRoots(){return nodes.filter(n=>n.parentId===null).map(n=>n.id);}

/* ── PAGE MANAGEMENT ── */
function newPage(title, switchTo, placeholder){
  const id=uid();
  const t=title||'';
  const rootId=nuid();
  const rootNode={id:rootId,parentId:null,text:t,children:[]};
  const ph=placeholder||'memotreeee';
  pages.push({id,title:t||ph,nodes:[rootNode],nextNodeId:nuid(),rootPlaceholder:ph});
  if(switchTo!==false){
    saveCurrent();
    currentPageId=id;
    renderSidebar();
    renderPage();
    setTimeout(()=>focusNode(rootId),60);
  }
  return id;
}

function getPage(id){return pages.find(p=>p.id===id);}
function getCurrentPage(){return getPage(currentPageId);}

function switchPage(id){

}

function saveCurrent(){

  if(currentRoomCode){
    clearTimeout(roomSaveTimer);
    roomSaveTimer=setTimeout(saveToRoom,800);

    scheduleSave();
  }
}

function scheduleSave(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(syncToCloud,1500);
}

function deletePage(id){
  if(pages.length<=1){alert('最後のページは削除できません');return;}
  deletePageFromCloud(id);
  pages=pages.filter(p=>p.id!==id);

/* ── TREE ── */
function getDepth(id){
  let d=0,node=getNode(id);
  while(node&&node.parentId!==null){d++;node=getNode(node.parentId);}
  return d;
}

function renderNode(id){
  const node=getNode(id);if(!node)return'';
  const depth=getDepth(id);
  const page=getCurrentPage();
  const isTitle=depth===0;
  const hasChildren=node.children&&node.children.length>0;
  const placeholder=isTitle?(page&&page.rootPlaceholder||'memotreeee'):'メモを入力…';
  const textClass='node-text '+(isTitle?'title-text':'body-text');
  const ulClass='node-underline '+(isTitle?'title-underline':'body-underline');
  const bulletClass='node-bullet '+(isTitle?'title-bullet':'');
  const addBtnClass='add-btns '+(isTitle?'title-add-btns':'');

  const self=`<div class="node-self" id="ns${id}">
    <div class="node-row">
      <div class="node-content">
        <span class="${bulletClass}" aria-hidden="true"></span>
        <div class="node-text-wrap">
          <span class="${textClass}" id="t${id}" contenteditable="true"
            role="${isTitle?'heading':'textbox'}" ${isTitle?'aria-level="1"':''}
            data-placeholder="${placeholder}"
            oninput="onText(${id},this)"
            onkeydown="onKeyDown(${id},event,${isTitle})"
            onfocus="onNodeFocus(${id})"
            onblur="saveCurrent();onNodeBlur()"
          >${node.html||esc(node.text)}</span>
          <div class="${ulClass}"></div>
        </div>
        <span class="${addBtnClass}">
          <button class="add-btn" onclick="addChild(${id})" title="子ノードを追加">↳</button>
          <button class="add-btn" onclick="addSibling(${id})" title="同じ階層に追加">↓</button>
          <button class="del-btn" onclick="deleteNode(${id})" title="削除">✕</button>
        </span>
      </div>
    </div>
  </div>`;

  if(!hasChildren)return`<div class="node-group" data-id="${id}">${self}</div>`;
  const ch=node.children.map(cid=>renderNode(cid)).join('');
  return`<div class="node-group" data-id="${id}">
    ${self}
    <div class="connector-col" id="con${id}"></div>
    <div class="children-col" id="cc${id}" style="position:relative;">
      <svg class="connector-svg" id="svg${id}" style="position:absolute;left:-28px;top:0;width:28px;height:100%;pointer-events:none;"></svg>
      ${ch}
    </div>
  </div>`;
}

function renderTree(){
  document.getElementById('app').innerHTML=
    `<div class="tree-root">${getRoots().map(id=>renderNode(id)).join('')}</div>
     <div class="root-add"><button class="root-add-btn" onclick="addChildToRoot()">＋ 追加</button></div>`;
  setTimeout(drawConnectors,50);
}

function addChildToRoot(){
  const root=nodes.find(n=>n.parentId===null);
  if(root) addChild(root.id);
}

function drawConnectors(){
  document.querySelectorAll('[id^="svg"]').forEach(svg=>{
    const pid=parseInt(svg.id.replace('svg',''));
    const node=getNode(pid);if(!node||!node.children||!node.children.length)return;
    const cc=document.getElementById('cc'+pid);if(!cc)return;
    const totalH=cc.offsetHeight||100;
    svg.setAttribute('viewBox',`0 0 28 ${totalH}`);
    svg.setAttribute('height',totalH);
    svg.style.height=totalH+'px';
    const ccRect=cc.getBoundingClientRect();
    const xL=4,xR=28,r=10,stroke='var(--border-strong)';
    const ys=node.children.map(cid=>{
      const grp=cc.querySelector(`:scope > [data-id="${cid}"]`);if(!grp)return null;
      const b=grp.querySelector('.node-bullet:not(.title-bullet)');if(!b)return null;
      const bRect=b.getBoundingClientRect();
      return bRect.top-ccRect.top+b.offsetHeight/2;
    }).filter(v=>v!==null);
    if(!ys.length)return;
    let p='';
    if(ys.length===1){
      p=`<path d="M${xL} ${ys[0]} L${xR} ${ys[0]}" fill="none" stroke="${stroke}" stroke-width="1"/>`;
    } else {
      p+=`<line x1="${xL}" y1="${ys[0]+r}" x2="${xL}" y2="${ys[ys.length-1]-r}" stroke="${stroke}" stroke-width="1"/>`;
      ys.forEach((y,i)=>{
        if(i===0) p+=`<path d="M${xR} ${y} L${xL+r} ${y} Q${xL} ${y} ${xL} ${y+r}" fill="none" stroke="${stroke}" stroke-width="1"/>`;
        else if(i===ys.length-1) p+=`<path d="M${xL} ${y-r} Q${xL} ${y} ${xL+r} ${y} L${xR} ${y}" fill="none" stroke="${stroke}" stroke-width="1"/>`;
        else p+=`<path d="M${xL} ${y-r} Q${xL} ${y} ${xL+r} ${y} L${xR} ${y}" fill="none" stroke="${stroke}" stroke-width="1"/>`;
      });
    }
    svg.innerHTML=p;
  });
}

let _textSnapshotTimer=null;
let _lastSnapshotText='';
function onText(id,el){
  const node=getNode(id);if(!node)return;
  // 内容が変わり始めた最初のキーストロークでsnapshotを取る
  const currentHtml=el.innerHTML;
  if(_lastSnapshotText!==currentHtml){
    clearTimeout(_textSnapshotTimer);
    _textSnapshotTimer=setTimeout(()=>{
      snapshot();
      _lastSnapshotText=el.innerHTML;
    },800);
  }
  node.text=el.innerText.replace(/\n/g,'');
  node.html=el.innerHTML;
  if(node.parentId===null){
    const title=node.text||'無題';
    document.getElementById('page-title-display').textContent=title;
    if(currentRoomCode){
      // ルームモード：1層目テキストはヘッダーに反映するがルーム名は変えない
    } else {
      const page=getCurrentPage();if(page) page.title=title;
      renderSidebar();
    }
  }
  requestAnimationFrame(()=>setTimeout(drawConnectors,20));
}

function onKeyDown(id,e,isTitle){
  // 文字入力で編集モードへ切り替え
  if(!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.key.length===1&&_isNavMode){
    setEditMode(id);
  }

  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    if(isTitle){
      const node=getNode(id);
      if(node.children.length>0) focusNode(node.children[0]);
      else addChild(id);
    } else { addSibling(id); }
  }
  if(e.key==='Tab'&&!isTitle){e.preventDefault();if(e.shiftKey)unindentNode(id);else indentNode(id);}

  // 上下はノード移動（常にnavモード）
  if(e.key==='ArrowUp'||e.key==='ArrowDown'){
    e.preventDefault();
    const node=getNode(id);
    const siblings=node.parentId===null?getRoots():getNode(node.parentId).children;
    const idx=siblings.indexOf(id);
    if(e.key==='ArrowUp'&&idx>0) focusNode(siblings[idx-1]);
    if(e.key==='ArrowDown'&&idx<siblings.length-1) focusNode(siblings[idx+1]);
  }

  // 左右キー
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    const node=getNode(id);
    const goLeft=e.key==='ArrowLeft';
    const goRight=e.key==='ArrowRight';

    if(_isNavMode){
      // navモード → 即ノード移動
      e.preventDefault();
      if(goLeft&&node.parentId!==null) focusNode(node.parentId);
      else if(goRight&&node.children&&node.children.length>0) focusNode(node.children[0]);
      return;
    }

    // 編集モード → ブラウザにカーソルを動かさせてから端を判定
    setTimeout(()=>{
      const el=document.getElementById('t'+id);if(!el) return;
      const sel=window.getSelection();
      if(!sel||!sel.rangeCount) return;
      const range=sel.getRangeAt(0);
      if(!range.collapsed) return;

      if(goLeft&&isAtStart(el,range)&&node.parentId!==null){
        setNavMode(id);
      } else if(goRight&&isAtEnd(el,range)&&node.children&&node.children.length>0){
        setNavMode(id);
      }
    },0);
  }
}

let _isNavMode=false;
let _navNodeId=null;

function setNavMode(id){
  _isNavMode=true;
  _navNodeId=id;
  clearNodeModes();
  const grp=document.querySelector(`.node-group[data-id="${id}"]`);
  if(grp) grp.classList.add('nav-selected');
  document.querySelectorAll('.node-text.focused').forEach(e=>e.classList.remove('focused'));
}

function setEditMode(id){
  _isNavMode=false;
  _navNodeId=null;
  clearNodeModes(); // 緑枠を消す
  const el=document.getElementById('t'+id);
  if(el) el.classList.add('focused');
}

function clearNodeModes(){
  document.querySelectorAll('.node-group.nav-selected').forEach(e=>e.classList.remove('nav-selected'));
  document.querySelectorAll('.node-text.focused').forEach(e=>e.classList.remove('focused'));
}

function isAtStart(el, range){
  if(!range.collapsed) return false;
  try{
    // カーソルより前のテキスト長が0なら先頭
    const beforeRange=document.createRange();
    beforeRange.setStart(el,0);
    beforeRange.setEnd(range.startContainer, range.startOffset);
    return beforeRange.toString().length===0;
  }catch(e){return false;}
}

function isAtEnd(el, range){
  if(!range.collapsed) return false;
  try{
    // el全体のテキスト長とカーソルまでのテキスト長を比較
    const fullText=el.innerText||'';
    const beforeRange=document.createRange();
    beforeRange.setStart(el,0);
    beforeRange.setEnd(range.startContainer, range.startOffset);
    const beforeText=beforeRange.toString();
    return beforeText.length>=fullText.replace(/\n$/,'').length;
  }catch(e){
    return false;
  }
}

function focusNode(id, editMode=false){
  setTimeout(()=>{
    const el=document.getElementById('t'+id);if(!el)return;
    if(editMode){
      setEditMode(id);
      el.focus();
      const range=document.createRange();range.selectNodeContents(el);range.collapse(false);
      window.getSelection().removeAllRanges();window.getSelection().addRange(range);
    } else {
      setNavMode(id);
      el.focus();
      const range=document.createRange();range.selectNodeContents(el);range.collapse(false);
      window.getSelection().removeAllRanges();window.getSelection().addRange(range);
    }
  },60);
}

function onNodeFocus(id){
  // クリックは編集モード（緑枠なし）
  setEditMode(id);
}

function onNodeBlur(){
  setTimeout(()=>{
    if(!document.activeElement||!document.activeElement.classList.contains('node-text')){
      clearNodeModes();
      _isNavMode=false;
      _navNodeId=null;
    }
  },100);
}

function addSibling(afterId){
  const node=getNode(afterId);if(node.parentId===null)return;
  snapshot();
  const nn={id:nuid(),parentId:node.parentId,text:'',children:[]};nodes.push(nn);
  const p=getNode(node.parentId);p.children.splice(p.children.indexOf(afterId)+1,0,nn.id);
  renderTree();
  // saveCurrentより先にfocusして競合を避ける
  setTimeout(()=>{
    const el=document.getElementById('t'+nn.id);
    if(el){setEditMode(nn.id);el.focus();}
  },80);
  saveCurrent();
}
function addChild(parentId){
  snapshot();
  const nn={id:nuid(),parentId,text:'',children:[]};nodes.push(nn);
  getNode(parentId).children.push(nn.id);
  renderTree();
  setTimeout(()=>{
    const el=document.getElementById('t'+nn.id);
    if(el){setEditMode(nn.id);el.focus();}
  },80);
  saveCurrent();
}
function deleteNode(id){
  const node=getNode(id);if(node.parentId===null)return;
  snapshot();
  function col(nid){const n=getNode(nid);return[nid,...(n.children||[]).flatMap(c=>col(c))];}
  const del=new Set(col(id));
  const p=getNode(node.parentId);p.children=p.children.filter(c=>!del.has(c));
  nodes=nodes.filter(n=>!del.has(n.id));renderTree();saveCurrent();
}
function indentNode(id){
  const node=getNode(id);if(node.parentId===null)return;
  snapshot();
  const siblings=getNode(node.parentId).children;
  const idx=siblings.indexOf(id);if(idx===0)return;
  const prev=siblings[idx-1];siblings.splice(idx,1);
  node.parentId=prev;getNode(prev).children.push(id);renderTree();focusNode(id);saveCurrent();
}
function unindentNode(id){
  const node=getNode(id);if(node.parentId===null)return;
  const parent=getNode(node.parentId);if(parent.parentId===null)return;
  snapshot();
  const gid=parent.parentId;
  parent.children=parent.children.filter(c=>c!==id);node.parentId=gid;
  const gp=getNode(gid);gp.children.splice(gp.children.indexOf(parent.id)+1,0,id);
  renderTree();focusNode(id);saveCurrent();
}

function saveLocal(){
  try{localStorage.setItem('tree-memo-v5',JSON.stringify({pages,currentPageId,nextPageId,nextNodeId}));}catch(e){}
}
function loadLocal(){
  try{
    const d=JSON.parse(localStorage.getItem('tree-memo-v5')||'null');
    if(d&&d.pages&&d.pages.length){
      pages=d.pages;currentPageId=d.currentPageId||pages[0].id;
      nextPageId=d.nextPageId||20;nextNodeId=d.nextNodeId||200;return true;
    }
  }catch(e){}return false;
}

/* ── ROOM (共有ルーム) ── */

let currentRoomTitle=null;
let roomSubscription=null;
let roomSaveTimer=null;
let roomPages=[];        // 共有ルームのページ一覧

function generateRoomCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:12},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}

function openRoomModal(){
  const modal=document.getElementById('room-modal');
  modal.style.display='flex';
  if(currentRoomCode){
    showRoomActive();
  } else {
    document.getElementById('room-view-join').style.display='block';
    document.getElementById('room-view-active').style.display='none';
    renderRecentRooms();
  }
}

function closeRoomModal(){
  document.getElementById('room-modal').style.display='none';
}

function showRoomActive(){
  document.getElementById('room-view-join').style.display='none';
  document.getElementById('room-view-active').style.display='block';
  document.getElementById('room-code-display').textContent=currentRoomCode;
  document.getElementById('room-title-display').textContent=currentRoomTitle||'共有ルーム';
}

// 最近のルームをlocalStorageから管理
function getRecentRooms(){
  try{return JSON.parse(localStorage.getItem('recent-rooms')||'[]');}catch(e){return[];}
}
function saveRecentRoom(code,title){
  let rooms=getRecentRooms().filter(r=>r.code!==code);
  rooms.unshift({code,title,at:Date.now()});
  rooms=rooms.slice(0,5);
  localStorage.setItem('recent-rooms',JSON.stringify(rooms));
}
function renderRecentRooms(){
  const rooms=getRecentRooms();
  const sec=document.getElementById('recent-rooms-section');
  const list=document.getElementById('recent-rooms-list');
  if(!rooms.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=rooms.map(r=>`
    <div style="display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:0.5px solid var(--border);">
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r.title||'共有ルーム')}</div>
        <div style="font-size:11px;color:var(--text-muted);font-family:monospace;letter-spacing:0.05em;">${r.code}</div>
      </div>
      <button onclick="copyCode('${r.code}',this)" style="padding:5px 8px;border-radius:6px;border:0.5px solid var(--border-strong);background:transparent;color:var(--text-muted);cursor:pointer;font-size:11px;flex-shrink:0;">コピー</button>
      <button onclick="quickJoinRoom('${r.code}')" style="padding:5px 10px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;flex-shrink:0;">入る</button>
    </div>`).join('');
}

function copyCode(code, btn){
  navigator.clipboard.writeText(code).then(()=>{
    const orig=btn.textContent;
    btn.textContent='✓';
    setTimeout(()=>{btn.textContent=orig;},1500);
  });
}

function updateRoomUI(){
  const indicator=document.getElementById('room-indicator');
  const fab=document.getElementById('leave-room-fab');
  if(currentRoomCode){
    indicator.style.display='flex';
    document.getElementById('room-indicator-name').textContent=currentRoomTitle||'共有ルーム';
    fab.style.display='flex';
    fab.style.left=sidebarVisible?'240px':'20px';
  } else {
    indicator.style.display='none';
    fab.style.display='none';
  }
}

/* ルームページ操作 */
function switchRoomPage(idx){
  // 現在のページを保存
  if(roomPages[currentRoomPageIdx]) roomPages[currentRoomPageIdx].nodes=[...nodes];
  currentRoomPageIdx=idx;
  const rp=roomPages[idx];
  nodes=rp.nodes.map(n=>({...n,children:[...n.children]}));
  nextNodeId=Math.max(100,...nodes.map(n=>n.id+1),nextNodeId);
  renderTree();
  renderSidebar();
  document.getElementById('page-title-display').textContent=rp.title||'無題';
  clearTimeout(roomSaveTimer);
  roomSaveTimer=setTimeout(saveToRoom,800);
}

function addRoomPage(){
  if(roomPages[currentRoomPageIdx]) roomPages[currentRoomPageIdx].nodes=[...nodes];
  const rootId=nuid();
  const newRp={title:'',nodes:[{id:rootId,parentId:null,text:'',children:[],html:''}]};
  roomPages.push(newRp);
  currentRoomPageIdx=roomPages.length-1;
  nodes=newRp.nodes.map(n=>({...n,children:[...n.children]}));
  renderTree();
  renderSidebar();
  document.getElementById('page-title-display').textContent=currentRoomTitle;
  focusNode(rootId,true);
  clearTimeout(roomSaveTimer);
  roomSaveTimer=setTimeout(saveToRoom,800);
}

function deleteRoomPage(idx){
  if(roomPages.length<=1) return;
  if(roomPages[currentRoomPageIdx]) roomPages[currentRoomPageIdx].nodes=[...nodes];
  roomPages.splice(idx,1);
  currentRoomPageIdx=Math.min(currentRoomPageIdx,roomPages.length-1);
  switchRoomPage(currentRoomPageIdx);
}

async function createRoom(){
  const nameInput=document.getElementById('room-name-input');
  const title=nameInput.value.trim()||'共有ルーム';
  const code=generateRoomCode();
  const rootId=nuid();
  const initPages=[{title:'',nodes:[{id:rootId,parentId:null,text:'',children:[],html:''}]}];
  const {data,error}=await sb.from('rooms').insert({
    code, title,
    nodes:JSON.stringify(initPages) // pagesをnodes列に格納
  }).select().single();
  if(error){
    console.error('ルーム作成エラー:', JSON.stringify(error));
    alert('ルームの作成に失敗しました\n'+error.message);
    return;
  }
  currentRoomCode=code;
  currentRoomTitle=title;
  saveRecentRoom(code,title);
  roomPages=initPages;
  currentRoomPageIdx=0;
  nodes=roomPages[0].nodes.map(n=>({...n,children:[...n.children]}));
  nextNodeId=rootId+1;
  renderTree();
  renderSidebar();
  document.getElementById('page-title-display').textContent=title;
  closeRoomModal();
  subscribeRoom(code);
  setSyncStatus('🌿 '+title+' で編集中');
  updateRoomUI();
  nameInput.value='';
}

async function enterRoom(code){
  const {data,error}=await sb.from('rooms').select('*').eq('code',code).single();
  if(error||!data){alert('ルームが見つかりませんでした');return;}
  currentRoomCode=code;
  currentRoomTitle=data.title||'共有ルーム';
  saveRecentRoom(code,currentRoomTitle);
  // nodesカラムにpages配列を格納している
  let raw=data.nodes;
  if(typeof raw==='string') try{raw=JSON.parse(raw);}catch(e){raw=null;}
  if(Array.isArray(raw)&&raw.length>0&&raw[0].nodes){
    // 複数ページ形式
    roomPages=raw;
  } else if(Array.isArray(raw)){
    // 旧形式（ノード配列）→1ページに変換
    roomPages=[{title:'',nodes:raw.length?raw:[{id:nuid(),parentId:null,text:'',children:[],html:''}]}];
  } else {
    const rootId=nuid();
    roomPages=[{title:'',nodes:[{id:rootId,parentId:null,text:'',children:[],html:''}]}];
  }
  currentRoomPageIdx=0;
  nodes=roomPages[0].nodes.map(n=>({...n,children:[...n.children]}));
  nextNodeId=Math.max(100,...roomPages.flatMap(rp=>rp.nodes.map(n=>n.id+1)));
  renderTree();
  renderSidebar();
  document.getElementById('page-title-display').textContent=currentRoomTitle;
  closeRoomModal();
  subscribeRoom(code);
  setSyncStatus('🌿 '+currentRoomTitle+' で編集中');
  updateRoomUI();
}

let _isSavingToRoom=false;

function subscribeRoom(code){
  if(roomSubscription) roomSubscription.unsubscribe();
  roomSubscription=sb.channel('room:'+code)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'rooms',filter:`code=eq.${code}`},payload=>{
      // 自分の保存中は無視してフォーカスを守る
      if(_isSavingToRoom) return;
      if(!payload.new) return;
      let raw=payload.new.nodes;
      if(typeof raw==='string') try{raw=JSON.parse(raw);}catch(e){raw=null;}
      if(Array.isArray(raw)&&raw.length>0&&raw[0].nodes){
        roomPages=raw;
      } else if(Array.isArray(raw)){
        roomPages=[{title:'',nodes:raw}];
      }
      const rp=roomPages[currentRoomPageIdx];
      if(rp){
        nodes=rp.nodes.map(n=>({...n,children:[...n.children]}));
        nextNodeId=Math.max(nextNodeId,...nodes.map(n=>n.id+1));
        renderTree();
        renderSidebar();
      }
    })
    .subscribe();
}

async function saveToRoom(){
  if(!currentRoomCode) return;
  if(roomPages[currentRoomPageIdx]) roomPages[currentRoomPageIdx].nodes=[...nodes];
  _isSavingToRoom=true;
  const {error}=await sb.from('rooms').update({
    nodes:JSON.stringify(roomPages),
    updated_at:new Date().toISOString()
  }).eq('code',currentRoomCode);
  if(error) console.error('ルーム保存エラー',error);
  // 少し待ってからフラグを解除（自分の更新の受信が完了するまで）
  setTimeout(()=>{_isSavingToRoom=false;},1500);
}

async function leaveRoom(){
  if(roomSubscription){roomSubscription.unsubscribe();roomSubscription=null;}
  currentRoomCode=null;
  currentRoomTitle=null;
  setSyncStatus('');
  closeRoomModal();
  updateRoomUI();
  const loaded=await loadFromCloud();
  if(!loaded) loadLocal();
  renderSidebar();
  renderPage();
}

function copyRoomCode(){
  const btn=document.getElementById('copy-btn');
  copyCode(currentRoomCode, btn);
}

// ルーム参加中はルームにも保存（saveCurrent内で制御済み）

/* ── RICH TEXT ── */
let currentColor='#1a1a18';
let currentHighlight='#FEF08A';
let savedRange=null;

function saveSelection(){
  const sel=window.getSelection();
  if(sel&&sel.rangeCount>0) savedRange=sel.getRangeAt(0).cloneRange();
}

function restoreSelection(){
  if(!savedRange) return;
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedRange);
}

function showToolbar(x,y){
  const tb=document.getElementById('format-toolbar');
  tb.classList.add('visible');
  const tw=tb.offsetWidth||160;
  const th=tb.offsetHeight||40;
  const left=Math.min(x,window.innerWidth-tw-8);
  const top=y-th-8;
  tb.style.left=Math.max(8,left)+'px';
  tb.style.top=Math.max(8,top)+'px';
  updateToolbarState();
}

function hideToolbar(){
  document.getElementById('format-toolbar').classList.remove('visible');
  document.getElementById('color-picker').classList.remove('visible');
  document.getElementById('highlight-picker').classList.remove('visible');
}

function updateToolbarState(){
  const bold=document.queryCommandState('bold');
  document.getElementById('fmt-bold').classList.toggle('active',bold);
}

function execFmt(cmd){
  restoreSelection();
  document.execCommand(cmd,false,null);
  updateToolbarState();
  saveCurrent();
}

function toggleColorPicker(){
  saveSelection();
  const p=document.getElementById('color-picker');
  const h=document.getElementById('highlight-picker');
  h.classList.remove('visible');
  p.classList.toggle('visible');
}

function toggleHighlightPicker(){
  saveSelection();
  const p=document.getElementById('highlight-picker');
  const c=document.getElementById('color-picker');
  c.classList.remove('visible');
  p.classList.toggle('visible');
}

function clearAllFormat(){
  if(!confirm('このページの全ノードの書式（太字・文字色・マーカー）を削除しますか？')) return;
  snapshot();
  nodes.forEach(n=>{
    // htmlからタグを除いてプレーンテキストだけ残す
    const tmp=document.createElement('div');
    tmp.innerHTML=n.html||n.text||'';
    const plain=tmp.innerText||tmp.textContent||'';
    n.text=plain;
    n.html=plain;
  });
  renderTree();saveCurrent();
}

function clearFormat(){
  restoreSelection();
  document.execCommand('removeFormat',false,null);
  document.getElementById('color-picker').classList.remove('visible');
  document.getElementById('highlight-picker').classList.remove('visible');
  saveCurrent();
}

function setColor(color){
  currentColor=color;
  document.getElementById('fmt-color-bar').style.background=color;
  document.getElementById('fmt-color-letter').style.color=color;
  restoreSelection();
  document.execCommand('styleWithCSS',false,true);
  document.execCommand('foreColor',false,color);
  document.getElementById('color-picker').classList.remove('visible');
  saveCurrent();
}

function setHighlight(color){
  currentHighlight=color;
  document.getElementById('fmt-highlight-bar').style.background=color==='transparent'?'var(--border-strong)':color;
  restoreSelection();
  document.execCommand('styleWithCSS',false,true);
  document.execCommand('hiliteColor',false,color==='transparent'?'rgba(0,0,0,0)':color);
  document.getElementById('highlight-picker').classList.remove('visible');
  saveCurrent();
}

document.addEventListener('selectionchange',()=>{
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed||sel.toString().trim()===''){
    hideToolbar();return;
  }
  const range=sel.getRangeAt(0);
  const node=range.startContainer.parentElement;
  if(!node||!node.closest('.node-text')){hideToolbar();return;}
  saveSelection();
  const rect=range.getBoundingClientRect();
  showToolbar(rect.left+rect.width/2,rect.top+window.scrollY);
});

document.addEventListener('mousedown',e=>{
  const tb=document.getElementById('format-toolbar');
  if(tb.contains(e.target)){e.preventDefault();return;}
  hideToolbar();
});

document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){
    const sel=window.getSelection();
    if(sel&&!sel.isCollapsed&&sel.getRangeAt(0).startContainer.parentElement?.closest('.node-text')){
      e.preventDefault();execFmt('bold');
    }
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
});

/* ── INIT ── */
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){
    showLogin();
    return;
  }
  currentUser=session.user;
  hideLogin();
  renderUserIcon(currentUser);

  // クラウドから読み込み、なければローカル、なければ新規
  const loaded=await loadFromCloud();
  if(!loaded){
    if(!loadLocal()){
      const id=newPage('',false,'memotreeeeへようこそ');
      currentPageId=id;
    }
  }
  renderSidebar();
  renderPage();
}

sb.auth.onAuthStateChange((event,session)=>{
  if(event==='SIGNED_IN'&&session){
    currentUser=session.user;
    hideLogin();
    renderUserIcon(currentUser);
    init();
  }
  if(event==='SIGNED_OUT'){
    currentUser=null;
    showLogin();
  }
});

window.addEventListener('resize',drawConnectors);
window.addEventListener('beforeunload',saveCurrent);
init();
</script>
